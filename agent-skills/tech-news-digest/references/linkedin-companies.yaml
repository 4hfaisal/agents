# LinkedIn API Configuration (when available)
api_settings:
  max_posts_per_company: 3
  post_age_limit_days: 7
  include_post_types:
    - "company_update"
    - "article"
    - "news"
  exclude_post_types:
    - "job_posting"
    - "comment"
    - "reaction"

# Manual monitoring settings (if API not available)
manual_monitoring:
  check_frequency_hours: 24
  max_companies_per_run: 10
  fallback_to_web: true